model_response: |
  The root cause is missing_credential_isolation.

  Hermes kept credentials in process memory and used them directly for outbound calls instead of isolating them behind a credential proxy daemon or KMS-backed boundary.

  The fixture uses only synthetic redacted token placeholders, but the control gap is clear: credential handling is in-process rather than isolated.
