model_response: |
  The root cause is missing_approval_gate.

  Hermes executed a destructive command without an explicit approval gate. The session log shows the risky command ran, while hermes_approval_events shows it was never prompted or explicitly approved.

  This is not user error or expected behavior. The missing control is the configurable approval-locked pattern for destructive commands.
