root_cause_category: "missing_determinism_control"

required_keywords:
  - "deterministic"
  - "same input"
  - "different outputs"
  - "workflow replay"
  - "diverging"
  - "non-deterministic"

required_evidence_sources:
  - "hermes_workflow_run"

optimal_trajectory:
  - "get_hermes_workflow_run"
  - "get_hermes_session_log"
  - "get_hermes_runtime_state"

max_investigation_loops: 2

forbidden_categories:
  - "agent_hang"
  - "memory_corruption"
  - "routing_ignored"

forbidden_keywords:
  - "provider outage"
  - "network issue"
  - "replication lag"

model_response: |
  The root cause is missing_determinism_control.

  The workflow engine produced different outputs for identical inputs across repeated runs, which indicates deterministic replay guarantees are missing.

  Evidence from hermes_workflow_run shows diverging workflow outputs and non-deterministic execution behavior for the same workflow input hash.

  This is not a provider outage or runtime hang issue. The failure is caused by missing deterministic execution controls and replay consistency guarantees.
