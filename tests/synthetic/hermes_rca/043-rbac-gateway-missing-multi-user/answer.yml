model_response: |
  The root cause is missing_rbac.

  Hermes allowed cross-tenant access without enforcing RBAC scope validation. The RBAC evidence shows tenant isolation boundaries were bypassed and scope checks were not performed during resource access.

  This is an authorization control failure, not a routing or provider issue. Tenant/user scope enforcement is missing in the runtime access path.
