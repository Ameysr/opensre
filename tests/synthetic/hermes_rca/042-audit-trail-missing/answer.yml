model_response: |
  The root cause is missing_audit_trail.

  Hermes performed regulated actions without a tamper-evident audit trail. The audit policy requires signatures and a valid hash chain, but the observed audit summary shows zero signed events and chain breaks.

  This is a missing control issue, not user error. Hermes needs cryptographic audit logging with signatures and hash-chain validation for regulated actions.
